name: Playwright Tests (Docker)
on:
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Çalıştırılacak test etiketi (örn. @token-api-test veya @zod-schema-definition). Tüm testleri çalıştırmak için boş bırakın.'
        required: false
        default: ''

jobs:
  playwright-test:
    runs-on: ubuntu-latest
    # SİHİRLİ DOKUNUŞ: GitHub'a testi bu konteyner içinde koş diyoruz.
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy 
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: |
          if [ -n "${{ github.event.inputs.test_tag }}" ]; then
            echo "Çalıştırılan etiket: ${{ github.event.inputs.test_tag }}"
            npx playwright test --grep "${{ github.event.inputs.test_tag }}"
          else
            echo "Tüm testler çalıştırılıyor..."
            npx playwright test
          fi

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30