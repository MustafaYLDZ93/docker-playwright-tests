name: Playwright Tests (Docker)
on:
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Test tag to run (e.g. @token-api-test or @zod-schema-definition). Leave empty to run all tests.'
        required: false
        default: ''

jobs:
  playwright-test:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/playwright:v1.58.2-jammy
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: npm ci

      - name: Run Playwright tests
        run: |
          if [ -n "${{ github.event.inputs.test_tag }}" ]; then
            echo "Running tag: ${{ github.event.inputs.test_tag }}"
            npx playwright test --grep "${{ github.event.inputs.test_tag }}"
          else
            echo "Running all tests..."
            npx playwright test
          fi

      - name: Upload Playwright Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30